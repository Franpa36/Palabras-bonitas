<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palabras del Alma</title>
    <!-- Fuentes: Pinyon Script (Caligrafía) y Lora (Cuerpo) -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <!-- Librería para la descarga de imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --cafe: #2c1e14;
            --bronce: #c19a6b;
            --crema: #d7ccc8;
        }

        body {
            background-color: var(--cafe);
            background-image: radial-gradient(circle, #3e2723 0%, #1b1411 100%);
            color: var(--crema);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Lora', serif;
            overflow-x: hidden;
        }

        /* Área que se convertirá en imagen */
        #capture-area {
            padding: 50px;
            max-width: 650px;
            text-align: center;
            transition: opacity 0.5s ease;
            background: transparent;
            border-radius: 15px;
        }

        .word {
            font-family: 'Pinyon Script', cursive;
            font-size: 5.5rem;
            color: var(--bronce);
            margin: 0;
            font-style: italic;
            line-height: 1.1;
        }

        .meta {
            font-size: 1.2rem;
            font-style: italic;
            margin-top: 15px;
            color: #a1887f;
            letter-spacing: 1px;
        }

        .line {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--bronce), transparent);
            margin: 30px auto;
            width: 70%;
        }

        .definition {
            font-size: 1.4rem;
            line-height: 1.8;
            font-style: italic;
            color: var(--crema);
        }

        /* Contenedor de Botones */
        .button-container {
            margin-top: 50px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: transparent;
            border: 1px solid var(--bronce);
            color: var(--bronce);
            padding: 12px 25px;
            cursor: pointer;
            font-family: 'Lora', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: all 0.3s;
            z-index: 100; /* Asegura que esté por encima de todo */
        }

        button:hover {
            background: var(--bronce);
            color: var(--cafe);
        }

        /* Estilo para la descarga (Fondo blanco, letra negra) */
        .canvas-export {
            background-color: white !important;
            color: black !important;
        }
        .canvas-export .word, 
        .canvas-export .definition, 
        .canvas-export .meta {
            color: black !important;
        }
        .canvas-export .line {
            background: black !important;
        }
    </style>
</head>
<body>

    <div id="capture-area">
        <h1 class="word" id="word-text">Cargando...</h1>
        <p class="meta" id="meta-text"></p>
        <hr class="line">
        <p class="definition" id="def-text"></p>
    </div>

    <div class="button-container">
        <button onclick="getRandomWord()">Otra Palabra</button>
        <button onclick="download()">Descargar Imagen</button>
    </div>

    <script>
        const dictionary = [
            // Asiáticas
            { w: "Mono no aware", l: "Japonés", t: "Sensibilidad", d: "La belleza agridulce de saber que todo es efímero. Como el pétalo que cae sabiendo que su tiempo ha terminado.", tone: "melancólico" },
            { w: "Wabi-sabi", l: "Japonés", t: "Wabi-sabi", d: "La capacidad de ver la perfección en lo incompleto y lo roto. Una grieta no es un error, es historia.", tone: "sincero" },
            { w: "In-yeon", l: "Coreano", t: "Destino", d: "Si dos personas se cruzan en la calle es porque hubo 8,000 capas de conexión en sus vidas pasadas.", tone: "sincero" },
            { w: "Yuanfen", l: "Chino", t: "Causalidad", d: "La fuerza invisible que une a dos personas. Un destino que no se puede forzar, solo esperar.", tone: "afable" },
            { w: "Komorebi", l: "Japonés", t: "Luz de árbol", d: "La luz del sol que se filtra entre las hojas de los árboles, recordándonos que siempre hay luz entre las sombras.", tone: "afable" },
            { w: "Yūgen", l: "Japonés", t: "Misterio", d: "Un sentido profundo y misterioso de la belleza del universo, que es demasiado sutil para ser descrita con palabras.", tone: "melancólico" },
            { w: "Han", l: "Coreano", t: "Dolor", d: "Un sufrimiento colectivo, una tristeza profunda que se mezcla con la esperanza de que algún día las cosas serán diferentes.", tone: "melancólico" },
            
            // Europeas/Otras
            { w: "Saudade", l: "Portugués", t: "Saudade", d: "La presencia de la ausencia. Un vacío que se siente como una caricia de alguien que ya no está.", tone: "melancólico" },
            { w: "Ataraxia", l: "Griego", t: "Ataraxia", d: "Ese silencio interno donde el mundo deja de doler y el alma finalmente descansa.", tone: "afable" },
            { w: "Hiraeth", l: "Galés", t: "Añoranza", d: "Sentir nostalgia por un lugar que nunca existió, o por un hogar al que ya no se puede volver.", tone: "melancólico" }
        ];

        let history = [];

        function getRandomWord() {
            // Anti-repetición
            if (history.length === dictionary.length) history = [];
            
            let filtered = dictionary.filter(item => !history.includes(item.w));
            let item = filtered[Math.floor(Math.random() * filtered.length)];
            
            history.push(item.w);

            // Animación de salida
            document.getElementById('capture-area').style.opacity = 0;

            setTimeout(() => {
                document.getElementById('word-text').innerText = item.w;
                document.getElementById('meta-text').innerText = `(${item.l})${item.w !== item.t ? ' — ' + item.t : ''}`;
                document.getElementById('def-text').innerText = item.d;
                document.getElementById('capture-area').style.opacity = 1;
            }, 500);
        }

        function download() {
            const area = document.getElementById('capture-area');
            
            // Aplicar estilo de impresión (Blanco y Negro)
            area.classList.add('canvas-export');

            html2canvas(area, {
                backgroundColor: "#ffffff",
                scale: 3 // Alta definición
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Palabra-${document.getElementById('word-text').innerText}.png`;
                link.href = canvas.toDataURL();
                link.click();
                
                // Quitar estilo de impresión y volver al café
                area.classList.remove('canvas-export');
            });
        }

        window.onload = getRandomWord;
    </script>
</body>
</html>
