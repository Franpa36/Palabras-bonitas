<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voces del Mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <!-- Librería para convertir HTML a Imagen de forma gratuita -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --cafe-oscuro: #1b1411;
            --bronce: #c19a6b;
            --crema: #d7ccc8;
        }

        body {
            background-color: var(--cafe-oscuro);
            background-image: radial-gradient(circle, #3e2723 0%, #1b1411 100%);
            color: var(--crema);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Lora', serif;
            text-align: center;
        }

        /* Contenedor Visual de la App */
        #capture-area {
            padding: 40px;
            max-width: 600px;
            transition: all 0.8s ease;
        }

        .word {
            font-family: 'Pinyon Script', cursive;
            font-size: 5.5rem;
            color: var(--bronce);
            margin: 0;
            font-style: italic;
        }

        .meta {
            font-size: 1.1rem;
            font-style: italic;
            margin-top: 10px;
            color: #a1887f;
        }

        .line {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--bronce), transparent);
            margin: 30px auto;
            width: 60%;
        }

        .definition {
            font-size: 1.3rem;
            line-height: 1.7;
            font-style: italic;
        }

        /* Botones */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        button {
            background: none;
            border: 1px solid var(--bronce);
            color: var(--bronce);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Lora', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        button:hover {
            background: var(--bronce);
            color: white;
        }

        /* Estilo especial para la descarga (se activa solo un segundo) */
        .download-mode {
            background: white !important;
            color: black !important;
        }
        .download-mode .word { color: black !important; }
        .download-mode .line { background: black !important; }
        .download-mode .meta { color: #555 !important; }
    </style>
</head>
<body>

    <div id="capture-area">
        <h1 class="word" id="w">...</h1>
        <p class="meta" id="m"></p>
        <hr class="line" id="l">
        <p class="definition" id="d"></p>
    </div>

    <div class="controls">
        <button onclick="nextWord()">Siguiente Palabra</button>
        <button onclick="downloadImage()">Descargar Imagen</button>
    </div>

    <script>
        const words = [
            // Originales y nuevas
            { w: "Ataraxia", l: "Griego", t: "Ataraxia", d: "La paz que llega cuando el alma deja de pelear con el viento.", tone: "afable" },
            { w: "Taciturno", l: "Latín", t: "Taciturno", d: "Aquel que guarda silencios que pesan, prefiriendo el refugio de las sombras.", tone: "melancólico" },
            
            // Asiáticas (Japón, China, Corea)
            { w: "Mono no aware", l: "Japonés", t: "Sensibilidad ante lo efímero", d: "Una empatía profunda con el paso del tiempo. La belleza triste de saber que nada dura para siempre, como la caída de los cerezos.", tone: "melancólico" },
            { w: "Wabi-sabi", l: "Japonés", t: "Wabi-sabi", d: "Encontrar la perfección en lo imperfecto y la belleza en lo que está roto o viejo.", tone: "sincero" },
            { w: "Yuanfen", l: "Chino", t: "Destino vincular", d: "La fuerza que une a dos personas de forma inevitable. Un hilo invisible que atraviesa el tiempo y el espacio.", tone: "afable" },
            { w: "In-yeon", l: "Coreano", t: "Providencia", d: "La creencia de que cada encuentro entre dos personas es el resultado de miles de vidas pasadas de conexión.", tone: "sincero" },
            { w: "Koi No Yokan", l: "Japonés", t: "Premonición de amor", d: "No es amor a primera vista, sino la sensación inevitable de que vas a enamorarte irremediablemente de alguien en el futuro.", tone: "sincero" },
            { w: "Natsukashii", l: "Japonés", t: "Nostalgia alegre", d: "Cuando un pequeño detalle del presente te transporta a un recuerdo feliz del pasado, haciéndote sonreír con una pizca de tristeza.", tone: "afable" },
            { w: "Kintsugi", l: "Japonés", t: "Carpintería de oro", d: "El arte de reparar lo roto con oro, entendiendo que una pieza es más hermosa por haber sido quebrada y tener historia.", tone: "sincero" },
            { w: "Wu Wei", l: "Chino", t: "No acción", d: "Fluir con la naturaleza de las cosas sin forzarlas. Ser como el agua que vence a la roca por persistencia, no por fuerza.", tone: "afable" }
        ];

        let availableWords = [...words];

        function nextWord() {
            if (availableWords.length === 0) {
                availableWords = [...words]; // Reiniciar cuando se acaben
            }

            const index = Math.floor(Math.random() * availableWords.length);
            const item = availableWords.splice(index, 1)[0]; // Saca la palabra de la lista para no repetirla

            document.getElementById('w').innerText = item.w;
            document.getElementById('m').innerText = `(${item.l}) ${item.w !== item.t ? ' — ' + item.t : ''}`;
            document.getElementById('d').innerText = item.d;
        }

        async function downloadImage() {
            const area = document.getElementById('capture-area');
            
            // 1. Cambiamos visualmente a modo descarga (Blanco y Negro)
            area.classList.add('download-mode');
            
            // 2. Usamos html2canvas para crear la imagen
            html2canvas(area, {
                backgroundColor: "#ffffff",
                scale: 2 // Mayor calidad
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Palabra-${document.getElementById('w').innerText}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
                
                // 3. Devolvemos el estilo original
                area.classList.remove('download-mode');
            });
        }

        window.onload = nextWord;
    </script>
</body>
</html>
